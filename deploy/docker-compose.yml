# ============================================================
# 智能知识库平台 - Docker Compose 编排（开发/联调环境）
# 用途：本地开发和联调，启动全部 5 个服务
# 版本基线：Docker Compose 2.32.4（方案第13.1节）
# ============================================================

# 服务名称定义
# 方案第3.2节：首期部署单元为 web、api-server、worker、postgres、redis
name: knowledge-base-platform

services:
  # ============================================================
  # 1. Web 服务：Nginx + Vue SPA 静态资源
  # 对外暴露 80 端口，处理前端路由和 API 反向代理
  # ============================================================
  web:
    image: knowledge-base-platform-web:${APP_IMAGE_TAG:-local}
    build:
      # 构建上下文：项目根目录
      context: ..
      # Dockerfile 路径
      dockerfile: deploy/docker/web.Dockerfile
    # 容器名称（便于 docker compose 命令操作）
    container_name: kb-web
    # 对外暴露端口：宿主机 80 -> 容器 80
    ports:
      - "80:80"
    # 依赖：api-server 先启动，web 后启动
    depends_on:
      api-server:
        condition: service_healthy
    # 网络：加入应用网络
    networks:
      - app-network
    # 重启策略：异常退出时自动重启
    restart: unless-stopped

  # ============================================================
  # 2. API Server 服务：FastAPI 同步接口和 SSE
  # 仅内部网络访问，由 Nginx 反向代理
  # ============================================================
  api-server:
    image: knowledge-base-platform-api-server:${APP_IMAGE_TAG:-local}
    build:
      context: ..
      dockerfile: deploy/docker/api-server.Dockerfile
      target: runtime
    container_name: kb-api-server
    # 仅暴露端口给内部网络，不映射到宿主机
    # Nginx 通过 Docker 内部网络访问 api-server:8000
    expose:
      - "8000"
    # 环境变量：数据库连接、Redis 连接、密钥
    # 所有 Secret 通过环境变量传入，不硬编码
    environment:
      # 数据库连接 URL（异步驱动 asyncpg）
      # 格式：postgresql+asyncpg://用户名:密码@主机:端口/数据库名
      - DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/knowledge_base
      # Redis 连接 URL
      - REDIS_URL=redis://redis:6379/0
      # JWT 签名密钥
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required}
      - MODEL_KEY_FERNET_KEY=${MODEL_KEY_FERNET_KEY:-}
      - EXPORT_DOWNLOAD_SIGNING_KEY=${EXPORT_DOWNLOAD_SIGNING_KEY:-}
      # 应用版本
      - APP_VERSION=${APP_VERSION:-0.1.0}
      # 本文件用于本地开发/联调；生产环境必须显式设为 false。
      - APP_ENVIRONMENT=${APP_ENVIRONMENT:-development}
      - AUTO_SEED_DEMO_DATA=${AUTO_SEED_DEMO_DATA:-false}
      - DEMO_SEED_PASSWORD=${DEMO_SEED_PASSWORD:-}
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - REFRESH_TOKEN_EXPIRE_DAYS=${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      # 调试模式（开发环境可以开启）
      - DEBUG=${DEBUG:-false}
      # DeepSeek RAG 问答模型配置
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - DEEPSEEK_CHAT_MODEL=${DEEPSEEK_CHAT_MODEL:-deepseek-chat}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
      - DASHSCOPE_BASE_URL=${DASHSCOPE_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - DASHSCOPE_RERANK_BASE_URL=${DASHSCOPE_RERANK_BASE_URL:-https://dashscope.aliyuncs.com/compatible-api/v1}
      - QWEN_EMBEDDING_MODEL=${QWEN_EMBEDDING_MODEL:-text-embedding-v2}
      - QWEN_EMBEDDING_DIMENSIONS=${QWEN_EMBEDDING_DIMENSIONS:-1536}
      - QWEN_RERANK_MODEL=${QWEN_RERANK_MODEL:-qwen3-rerank}
      - RAG_ANSWER_CACHE_ENABLED=${RAG_ANSWER_CACHE_ENABLED:-true}
      - RAG_ANSWER_CACHE_TTL_SECONDS=${RAG_ANSWER_CACHE_TTL_SECONDS:-604800}
      - LLM_GUARD_ENABLED=${LLM_GUARD_ENABLED:-true}
      - LLM_GUARD_PRELOAD=${LLM_GUARD_PRELOAD:-true}
      - LLM_GUARD_FAIL_CLOSED=${LLM_GUARD_FAIL_CLOSED:-true}
      - LLM_GUARD_BAN_TOPICS_THRESHOLD=${LLM_GUARD_BAN_TOPICS_THRESHOLD:-0.5}
      - LLM_GUARD_PROMPT_INJECTION_THRESHOLD=${LLM_GUARD_PROMPT_INJECTION_THRESHOLD:-0.8}
      - LLM_GUARD_SCAN_TIMEOUT_SECONDS=${LLM_GUARD_SCAN_TIMEOUT_SECONDS:-30}
      - LLM_GUARD_THREAD_WORKERS=${LLM_GUARD_THREAD_WORKERS:-1}
      - PDF_PARSE_TIMEOUT_SECONDS=${PDF_PARSE_TIMEOUT_SECONDS:-120}
      - PDF_MAX_PAGES=${PDF_MAX_PAGES:-500}
      - PDF_PARSE_MEMORY_LIMIT_MB=${PDF_PARSE_MEMORY_LIMIT_MB:-512}
      - EXPORT_STORAGE_ROOT=/app/storage/exports
      # Compose 始终配套独立 Worker，API 只负责可靠入队。
      - WORKER_INLINE=false
    # 依赖：等数据库和 Redis 健康检查通过后再启动
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy  # 等待 PostgreSQL 健康检查通过
      redis:
        condition: service_healthy  # 等待 Redis 健康检查通过
    # 挂载卷：文件存储目录
    volumes:
      - storage_data:/app/storage
      - llm_guard_model_cache:/app/model-cache
    mem_limit: 4g
    cpus: 2.0
    networks:
      - app-network
    restart: unless-stopped

  # ============================================================
  # 3. Worker 服务：异步文档处理和导出
  # 不对外暴露端口，通过 Redis 队列接收任务
  # ============================================================
  worker:
    image: knowledge-base-platform-worker:${APP_IMAGE_TAG:-local}
    build:
      context: ..
      dockerfile: deploy/docker/worker.Dockerfile
    container_name: kb-worker
    # Worker 不暴露端口
    # 通过 Redis 队列接收任务，不处理 HTTP 请求
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/knowledge_base
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required}
      - MODEL_KEY_FERNET_KEY=${MODEL_KEY_FERNET_KEY:-}
      - EXPORT_DOWNLOAD_SIGNING_KEY=${EXPORT_DOWNLOAD_SIGNING_KEY:-}
      - APP_ENVIRONMENT=${APP_ENVIRONMENT:-development}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - DEEPSEEK_CHAT_MODEL=${DEEPSEEK_CHAT_MODEL:-deepseek-chat}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
      - DASHSCOPE_BASE_URL=${DASHSCOPE_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - DASHSCOPE_RERANK_BASE_URL=${DASHSCOPE_RERANK_BASE_URL:-https://dashscope.aliyuncs.com/compatible-api/v1}
      - QWEN_EMBEDDING_MODEL=${QWEN_EMBEDDING_MODEL:-text-embedding-v2}
      - QWEN_EMBEDDING_DIMENSIONS=${QWEN_EMBEDDING_DIMENSIONS:-1536}
      - QWEN_RERANK_MODEL=${QWEN_RERANK_MODEL:-qwen3-rerank}
      - RAG_ANSWER_CACHE_ENABLED=${RAG_ANSWER_CACHE_ENABLED:-true}
      - RAG_ANSWER_CACHE_TTL_SECONDS=${RAG_ANSWER_CACHE_TTL_SECONDS:-604800}
      - PDF_PARSE_TIMEOUT_SECONDS=${PDF_PARSE_TIMEOUT_SECONDS:-120}
      - PDF_MAX_PAGES=${PDF_MAX_PAGES:-500}
      - PDF_PARSE_MEMORY_LIMIT_MB=${PDF_PARSE_MEMORY_LIMIT_MB:-512}
      - EXPORT_STORAGE_ROOT=/app/storage/exports
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - storage_data:/app/storage
    mem_limit: 2g
    cpus: 2.0
    pids_limit: 512
    networks:
      - app-network
    restart: unless-stopped

  # ============================================================
  # 数据库迁移：应用启动前执行全部 Alembic heads
  # 这是一次性启动任务，不增加长期运行的部署单元。
  # ============================================================
  migrate:
    image: knowledge-base-platform-api-server:${APP_IMAGE_TAG:-local}
    build:
      context: ..
      dockerfile: deploy/docker/api-server.Dockerfile
      target: runtime
    container_name: kb-migrate
    working_dir: /app/backend
    command:
      - /app/backend/.venv/bin/alembic
      - -c
      - migrations/alembic.ini
      - upgrade
      - heads
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/knowledge_base
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required}
      - MODEL_KEY_FERNET_KEY=${MODEL_KEY_FERNET_KEY:-}
      - EXPORT_DOWNLOAD_SIGNING_KEY=${EXPORT_DOWNLOAD_SIGNING_KEY:-}
      - APP_ENVIRONMENT=${APP_ENVIRONMENT:-development}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    restart: "no"

  # ============================================================
  # 4. PostgreSQL 服务：业务数据 + 全文检索 + 向量检索
  # 使用 pgvector/pgvector 镜像（内置 pgvector 扩展）
  # 仅内部网络访问，不暴露到宿主机
  # ============================================================
  postgres:
    # 使用 pgvector 官方镜像（PostgreSQL 17 + pgvector 0.8.0）
    image: pgvector/pgvector:pg17@sha256:d2ef61f42ef767baa5a1475393303cc235bcd92febd9d7014eddb48b41f3bad0
    container_name: kb-postgres
    environment:
      # 数据库名称
      - POSTGRES_DB=knowledge_base
      # 数据库密码（从环境变量传入）
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    # 挂载卷：持久化数据库数据
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # 健康检查：使用 pg_isready 检查 PostgreSQL 是否就绪
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d knowledge_base"]
      interval: 10s   # 每 10 秒检查一次
      timeout: 5s     # 超时 5 秒
      retries: 5      # 连续失败 5 次标记为 unhealthy
      start_period: 10s  # 启动后等待 10 秒再开始检查
    networks:
      - app-network
    restart: unless-stopped

  # ============================================================
  # 5. Redis 服务：任务队列 + 短期缓存 + 分布式锁
  # 仅内部网络访问，不暴露到宿主机
  # ============================================================
  redis:
    # Redis 7.4.9 Alpine 镜像（精确版本，体积小）
    image: redis:7.4.9-alpine
    container_name: kb-redis
    # 健康检查：使用 redis-cli ping 检查 Redis 是否就绪
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - app-network
    restart: unless-stopped

# ============================================================
# Docker 卷定义
# 持久化存储，容器重启数据不丢失
# ============================================================
volumes:
  # PostgreSQL 数据卷：数据库文件
  postgres_data:
    name: kb-postgres-data
  # 文件存储卷：上传的原始文件、Markdown、assets
  storage_data:
    name: kb-storage-data
  # BanTopics 与 PromptInjection 权重缓存，容器重建后不重复下载。
  llm_guard_model_cache:
    name: kb-llm-guard-model-cache

# ============================================================
# Docker 网络定义
# 所有服务在同一个 bridge 网络中通信
# postgres 和 redis 不暴露到宿主机（仅内部网络）
# ============================================================
networks:
  app-network:
    name: kb-network
    driver: bridge
