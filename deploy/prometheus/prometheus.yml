# Prometheus 配置
# 抓取 API Server 指标
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "api-server"
    metrics_path: "/api/v1/metrics"
    static_configs:
      - targets: ["api-server:8000"]
    scrape_interval: 15s
    scrape_timeout: 10s

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres:5432"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis:6379"]

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - "alert.rules.yml"