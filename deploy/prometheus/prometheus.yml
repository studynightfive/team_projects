# 可选 Prometheus 配置；默认 Docker Compose 不会启动监控栈。
# Prometheus 必须加入 kb-network，才能直接抓取内部 API 指标端点。
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "api-server"
    metrics_path: "/api/v1/metrics"
    static_configs:
      - targets: ["api-server:8000"]
    scrape_timeout: 10s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - "alert.rules.yml"
