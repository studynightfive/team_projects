# 这里只使用应用当前真实采集的 HTTP 指标。
# PostgreSQL、Redis、磁盘和 Worker 告警需先部署相应 exporter 或采集逻辑。
groups:
  - name: api_alerts
    rules:
      - alert: APIServiceDown
        expr: up{job="api-server"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "API 服务不可用"
          description: "Prometheus 连续 1 分钟无法抓取 API Server。"

      - alert: APIErrorRateHigh
        expr: >-
          sum(rate(api_requests_total{status_code=~"5.."}[5m]))
          /
          clamp_min(sum(rate(api_requests_total[5m])), 1)
          > 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "API 5xx 比例超过 10%"
          description: "最近 5 分钟 API 5xx 比例持续超过 10%。"

      - alert: APILatencyHigh
        expr: >-
          histogram_quantile(
            0.95,
            sum by (le) (rate(api_request_duration_seconds_bucket[5m]))
          ) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API P95 延迟超过 5 秒"
          description: "最近 5 分钟 API P95 延迟持续超过 5 秒。"
