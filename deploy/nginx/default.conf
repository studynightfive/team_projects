# ============================================================
# 智能知识库平台 - Nginx 配置
# 用途：SPA 静态资源服务 + /api 反向代理 + SSE 支持
# 文档：方案第17.3节
# ============================================================

# ----------------------------------------------------------
# 上游服务器定义：FastAPI 后端
# ----------------------------------------------------------
resolver 127.0.0.11 valid=10s ipv6=off;
resolver_timeout 5s;

upstream api_server {
    # 使用 Docker 内部 DNS 动态解析，API 容器单独重建后无需重启 Nginx。
    zone api_server 64k;
    server api-server:8000 resolve;
}

# 空字符串键不会计入限流；只有匹配到的高风险端点进入对应共享区。
map $uri $auth_rate_key {
    default "";
    ~^/api/v1/auth/(login|refresh)$ $binary_remote_addr;
}

map $uri $registration_rate_key {
    default "";
    ~^/api/v1/auth/register$ $binary_remote_addr;
}

map $uri $expensive_rate_key {
    default "";
    ~^/api/v1/knowledge-bases/[^/]+/documents$ $binary_remote_addr;
    ~^/api/v1/models/[^/]+/test$ $binary_remote_addr;
    ~^/api/v1/chat/stream$ $binary_remote_addr;
    ~^/api/v1/retrieval/(search|answer)$ $binary_remote_addr;
}

limit_req_zone $auth_rate_key zone=auth_rate:10m rate=10r/m;
limit_req_zone $registration_rate_key zone=registration_rate:10m rate=3r/m;
limit_req_zone $expensive_rate_key zone=expensive_rate:10m rate=30r/m;

# ----------------------------------------------------------
# HTTP 服务器（开发/测试环境）
# 生产环境应使用 TLS + 安全响应头
# ----------------------------------------------------------
server {
    # 监听端口 80
    listen 80;
    # 服务器名称：匹配所有域名
    server_name _;
    server_tokens off;
    limit_req_status 429;

    # Prometheus 仅允许从 Docker 内网直连 api-server:8000 抓取。
    location = /api/v1/metrics {
        return 404;
    }

    # ----------------------------------------------------------
    # 上传文件大小限制
    # 方案第17.3节：与后端配置一致（100MB）
    # ----------------------------------------------------------
    # 后端将单次上传总量限制为 100 MiB；额外空间用于 multipart 边界。
    client_max_body_size 105m;

    # ----------------------------------------------------------
    # 安全响应头（方案第17.3节）
    # 开发环境也启用，确保安全配置一致性
    # ----------------------------------------------------------
    include /etc/nginx/snippets/security-headers.conf;

    # ----------------------------------------------------------
    # 静态资源：前端 SPA 构建产物
    # 路径：/usr/share/nginx/html/（Web Dockerfile 中复制到此位置）
    # ----------------------------------------------------------
    root /usr/share/nginx/html;

    # ----------------------------------------------------------
    # 静态资源缓存策略
    # ----------------------------------------------------------
    # JS 和 CSS 文件：文件名包含哈希，可以长期缓存
    location ~* \.(?:js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        include /etc/nginx/snippets/security-headers.conf;
    }

    # 图片和字体文件：可以中期缓存
    location ~* \.(?:png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
        include /etc/nginx/snippets/security-headers.conf;
    }

    # ----------------------------------------------------------
    # 前端 SPA 路由
    # / 和 /admin/* 使用同一 SPA 产物
    # 未命中静态文件时 fallback 到 /index.html（SPA fallback）
    # ----------------------------------------------------------
    location / {
        # 首先尝试匹配静态文件
        # 如果不存在，则返回 /index.html（由 Vue Router 处理前端路由）
        try_files $uri $uri/ /index.html;
    }

    # ----------------------------------------------------------
    # API 反向代理：/api 请求转发到 FastAPI 后端
    # 方案第17.3节：/api 反向代理到 API
    # ----------------------------------------------------------
    location /api/ {
        limit_req zone=auth_rate burst=5 nodelay;
        limit_req zone=registration_rate burst=2 nodelay;
        limit_req zone=expensive_rate burst=10 nodelay;
        # 代理到 api-server 上游
        proxy_pass http://api_server;

        # 转发原始请求信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 转发 request_id（如果前端已生成）
        proxy_set_header X-Request-ID $request_id;

        # 代理超时设置
        proxy_connect_timeout 30s;  # 连接超时
        proxy_send_timeout 60s;     # 发送超时
        proxy_read_timeout 60s;     # 读取超时（普通 API 请求）
    }

    # ----------------------------------------------------------
    # SSE 流式代理：/api/v1/chat/stream
    # 方案第17.3节：SSE 关闭代理缓冲并设置合适超时
    # 方案第4.6节：流式问答使用原生 Fetch + ReadableStream
    # ----------------------------------------------------------
    location /api/v1/chat/stream {
        limit_req zone=expensive_rate burst=10 nodelay;
        # 代理到 api-server 上游
        proxy_pass http://api_server;

        # 转发原始请求信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ----------------------------------------------------------
        # SSE 代理关键配置（方案第17.3节）
        # ----------------------------------------------------------
        # 关闭代理缓冲：SSE 需要实时推送数据，不能缓冲
        proxy_buffering off;
        # 关闭代理缓存：SSE 数据不应被缓存
        proxy_cache off;
        # 长连接超时：SSE 连接可能持续很长时间（流式问答）
        proxy_read_timeout 300s;
        # 清除 Connection 头：防止 HTTP/1.1 升级到 WebSocket
        proxy_set_header Connection '';
        # 启用分块传输编码：SSE 数据分块发送
        chunked_transfer_encoding on;

        # 禁用 gzip 压缩：SSE 数据应实时传输，不压缩
        gzip off;
    }

    # ----------------------------------------------------------
    # 健康检查端点（不记录访问日志，减少噪音）
    # ----------------------------------------------------------
    location /api/v1/health/ {
        proxy_pass http://api_server;
        access_log off;
    }

    # ----------------------------------------------------------
    # 错误页面
    # ----------------------------------------------------------
    # 50x 错误页面
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

