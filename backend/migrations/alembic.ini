# Alembic 配置文件
# 用于管理 PostgreSQL 数据库迁移

[alembic]
# 迁移脚本目录
script_location = migrations

# 数据库连接 URL 必须由环境变量提供，env.py 会在运行时覆盖此空值。
sqlalchemy.url =

# 日志配置
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
