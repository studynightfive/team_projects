name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:test-postgres-password@127.0.0.1:5432/knowledge_base_test
      REDIS_URL: redis://127.0.0.1:6379/0
      SECRET_KEY: test-secret-key-not-for-production
      TESTING: "true"
      AUTO_SEED_DEMO_DATA: "false"
      WORKER_INLINE: "true"
      LLM_GUARD_ENABLED: "false"

    services:
      postgres:
        image: pgvector/pgvector:pg17@sha256:d2ef61f42ef767baa5a1475393303cc235bcd92febd9d7014eddb48b41f3bad0
        env:
          POSTGRES_DB: knowledge_base_test
          POSTGRES_PASSWORD: test-postgres-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d knowledge_base_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7.4.9-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 检出代码
        uses: actions/checkout@v4.2.2

      - name: 检测工程
        id: projects
        shell: bash
        run: |
          if [[ -f pnpm-lock.yaml ]]; then
            echo "frontend=true" >> "$GITHUB_OUTPUT"
          else
            echo "frontend=false" >> "$GITHUB_OUTPUT"
          fi

          if [[ -f backend/pyproject.toml ]]; then
            echo "backend=true" >> "$GITHUB_OUTPUT"
          else
            echo "backend=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 验证治理文件
        shell: bash
        run: |
          test -f AGENTS.md
          test -f MEMORY.md
          test -f README.md
          test -f .github/ISSUE_TEMPLATE/feature.yml
          test -f .github/ISSUE_TEMPLATE/bug.yml
          test -f .github/pull_request_template.md

      - name: 配置 pnpm
        if: steps.projects.outputs.frontend == 'true'
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.13.0

      - name: 配置 Node.js
        if: steps.projects.outputs.frontend == 'true'
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 22.23.1
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: 安装前端依赖
        if: steps.projects.outputs.frontend == 'true'
        run: pnpm install --frozen-lockfile

      - name: Web 类型检查
        if: steps.projects.outputs.frontend == 'true'
        run: pnpm run typecheck:web

      - name: OpenAPI 前端类型一致性
        if: steps.projects.outputs.frontend == 'true'
        run: pnpm run check:api-types

      - name: Web Lint
        if: steps.projects.outputs.frontend == 'true'
        run: pnpm run lint:web

      - name: Web 测试
        if: steps.projects.outputs.frontend == 'true'
        run: pnpm run test:web

      - name: Web 构建
        if: steps.projects.outputs.frontend == 'true'
        run: pnpm run build:web

      - name: 配置 Python
        if: steps.projects.outputs.backend == 'true'
        uses: actions/setup-python@v5.6.0
        with:
          python-version: 3.10.20

      - name: 安装 uv
        if: steps.projects.outputs.backend == 'true'
        run: python -m pip install uv==0.11.26

      - name: 安装后端依赖
        if: steps.projects.outputs.backend == 'true'
        run: cd backend && uv sync --frozen

      - name: 后端 Ruff
        if: steps.projects.outputs.backend == 'true'
        run: cd backend && uv run ruff check .

      - name: 后端 mypy
        if: steps.projects.outputs.backend == 'true'
        run: cd backend && uv run mypy app

      - name: 数据库迁移一致性
        if: steps.projects.outputs.backend == 'true'
        run: |
          cd backend
          uv run alembic -c migrations/alembic.ini upgrade heads
          uv run alembic -c migrations/alembic.ini check

      - name: 后端测试
        if: steps.projects.outputs.backend == 'true'
        run: cd backend && uv run pytest tests

      - name: 样本库验证
        if: steps.projects.outputs.backend == 'true'
        run: uv run python scripts/validate_samples.py
