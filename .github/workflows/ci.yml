name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: 检出代码
        uses: actions/checkout@v4.2.2

      - name: 检测工程
        id: projects
        shell: bash
        run: |
          if [[ -f pnpm-lock.yaml ]]; then
            echo "frontend=true" >> "$GITHUB_OUTPUT"
          else
            echo "frontend=false" >> "$GITHUB_OUTPUT"
          fi

          if [[ -f backend/pyproject.toml ]]; then
            echo "backend=true" >> "$GITHUB_OUTPUT"
          else
            echo "backend=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 验证治理文件
        shell: bash
        run: |
          test -f AGENTS.md
          test -f MEMORY.md
          test -f README.md
          test -f .github/ISSUE_TEMPLATE/feature.yml
          test -f .github/ISSUE_TEMPLATE/bug.yml
          test -f .github/pull_request_template.md

      - name: 配置 pnpm
        if: steps.projects.outputs.frontend == 'true'
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.13.0

      - name: 配置 Node.js
        if: steps.projects.outputs.frontend == 'true'
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 22.23.1
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: 安装前端依赖
        if: steps.projects.outputs.frontend == 'true'
        run: pnpm install --frozen-lockfile

      - name: Web 类型检查
        if: steps.projects.outputs.frontend == 'true'
        run: pnpm run typecheck:web

      - name: Web Lint
        if: steps.projects.outputs.frontend == 'true'
        run: pnpm run lint:web

      - name: Web 测试
        if: steps.projects.outputs.frontend == 'true'
        run: pnpm run test:web

      - name: Web 构建
        if: steps.projects.outputs.frontend == 'true'
        run: pnpm run build:web

      - name: 配置 Python
        if: steps.projects.outputs.backend == 'true'
        uses: actions/setup-python@v5.6.0
        with:
          python-version: 3.10.20

      - name: 安装 uv
        if: steps.projects.outputs.backend == 'true'
        run: python -m pip install uv==0.11.26

      - name: 安装后端依赖
        if: steps.projects.outputs.backend == 'true'
        run: cd backend && uv sync --frozen

      - name: 后端 Ruff
        if: steps.projects.outputs.backend == 'true'
        run: uv run --project backend ruff check backend

      - name: 后端 mypy
        if: steps.projects.outputs.backend == 'true'
        run: uv run --project backend mypy backend/app

      - name: 后端测试
        if: steps.projects.outputs.backend == 'true'
        run: uv run --project backend pytest backend/tests
